name: Test CloudNativePG Integration

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'tests/test-cnpg.sh'
      - 'Makefile'
      - '.github/workflows/test-cnpg.yml'
  pull_request:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'tests/test-cnpg.sh'
      - 'Makefile'
      - '.github/workflows/test-cnpg.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-cnpg:
    runs-on: ubuntu-latest
    name: CNPG ImageVolume test (PG 18, k3s 1.33)
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test extensions (pgvector, pg_cron, postgis)
        env:
          DOCKER_BUILDKIT: 1
        run: |
          make build EXT=pgvector PG=18 REGISTRY=local
          make build EXT=pg_cron PG=18 REGISTRY=local
          make build EXT=postgis PG=18 REGISTRY=local

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Run CloudNativePG integration test
        run: make test-cnpg REGISTRY=local PG=18
