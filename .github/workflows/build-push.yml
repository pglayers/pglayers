name: Build and Push Extension Images

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'profiles/**'
      - 'Dockerfile.apt'
      - '.github/apt-versions.json'
      - '.github/base-image-digests.json'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'profiles/**'
      - 'Dockerfile.apt'
  schedule:
    # Weekly full rebuild (safety net): Sunday 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL major version (blank = all)'
        required: false
      extension:
        description: 'Extension name (blank = all)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PREFIX: pgx

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      extensions: ${{ steps.set.outputs.extensions }}
      build: ${{ steps.set.outputs.build }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2  # Need parent commit for diff

      - name: Build matrix (only changed extensions)
        id: set
        run: |
          pg_filter="${{ github.event.inputs.pg_version }}"
          ext_filter="${{ github.event.inputs.extension }}"

          # Detect which extensions changed (push/PR only)
          changed_exts=""
          if [ -z "$ext_filter" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "${{ github.event_name }}" != "schedule" ]; then
            changed_exts=$(git diff --name-only HEAD~1 -- extensions/ \
              | grep -oP 'extensions/\K[^/]+' | sort -u | tr '\n' ' ')
            # If the build workflow changed, rebuild everything.
            if git diff --name-only HEAD~1 | grep -q '.github/workflows/build-push.yml'; then
              changed_exts=""
            # The shared APT template affects every extension that uses it
            # (those without their own Dockerfile); rebuild those.
            elif git diff --name-only HEAD~1 | grep -qxF 'Dockerfile.apt'; then
              for d in extensions/*/; do
                e=$(basename "$d")
                [ -f "$d/Dockerfile" ] || changed_exts="$changed_exts $e"
              done
              changed_exts=$(echo "$changed_exts" | tr ' ' '\n' | sort -u | tr '\n' ' ')
            # The apt-versions lockfile is the explicit record of apt-shipped
            # versions. When it changes, rebuild exactly the extensions whose
            # recorded version changed -- this is what turns a PGDG apt update
            # into a real, deliberate layer rebuild.
            elif git diff --name-only HEAD~1 | grep -qxF '.github/apt-versions.json'; then
              git show HEAD~1:.github/apt-versions.json > /tmp/old-apt.json 2>/dev/null \
                || echo '{}' > /tmp/old-apt.json
              changed_exts=$(jq -r --slurpfile old /tmp/old-apt.json \
                'to_entries[] | select(.value != ($old[0][.key] // {})) | .key' \
                .github/apt-versions.json | tr '\n' ' ')
            fi
          fi

          extensions="[]"
          build="[]"
          for ext_dir in extensions/*/; do
            ext="$(basename "$ext_dir")"
            [ -n "$ext_filter" ] && [ "$ext" != "$ext_filter" ] && continue
            if [ -n "$changed_exts" ] && ! echo "$changed_exts" | grep -qw "$ext"; then
              continue
            fi
            # Reset all fields that may be absent from a given extension.conf,
            # otherwise values bleed over from a previously-sourced extension
            # (e.g. an ext without VERSION_19 would inherit the prior ext's,
            # producing a spurious PG 19 build with the wrong version).
            CI_SKIP=""
            APT_PACKAGE=""
            VCPKG_VERSION=""
            # Read below via indirect expansion (${!ver_var}), so shellcheck
            # cannot see the use.
            # shellcheck disable=SC2034
            VERSION_17=""
            # shellcheck disable=SC2034
            VERSION_18=""
            # shellcheck disable=SC2034
            VERSION_19=""
            source "$ext_dir/extension.conf"
            [ "${CI_SKIP:-}" = "1" ] && continue
            # APT extensions without their own Dockerfile use the shared template.
            dockerfile="extensions/$ext/Dockerfile"
            [ -f "$dockerfile" ] || dockerfile="Dockerfile.apt"
            for pg in 17 18 19; do
              [ -n "$pg_filter" ] && [ "$pg" != "$pg_filter" ] && continue
              ver_var="VERSION_${pg}"
              ver="${!ver_var}"
              # APT extensions carry no VERSION_XX: derive availability + the
              # version from PGDG. An empty result means the package is not
              # published for this PG major, so the combo is skipped (this is
              # what makes beta gaps like pglogical/tdigest on PG19 auto-skip).
              if [ -z "$ver" ] && [ -n "${APT_PACKAGE:-}" ]; then
                ver="$(./scripts/ext-version.sh "$ext" "$pg" 2>/dev/null || true)"
              fi
              [ -z "$ver" ] && continue
              extensions=$(echo "$extensions" | jq -c \
                --arg ext "$ext" --arg pg "$pg" --arg ver "$ver" \
                --arg apt "${APT_PACKAGE:-}" --arg df "$dockerfile" \
                '. + [{"extension": $ext, "pg": $pg, "version": $ver, "apt_package": $apt, "dockerfile": $df}]')
              # Source-built extensions: native build per arch (no QEMU)
              # APT-based extensions: single job with QEMU (fast enough)
              if [ -z "$APT_PACKAGE" ]; then
                for arch in amd64 arm64; do
                  build=$(echo "$build" | jq -c \
                    --arg ext "$ext" --arg pg "$pg" --arg ver "$ver" --arg arch "$arch" \
                    --arg vcpkg "${VCPKG_VERSION:-}" --arg df "$dockerfile" \
                    '. + [{"extension": $ext, "pg": $pg, "version": $ver, "arch": $arch, "native": true, "vcpkg_version": $vcpkg, "apt_package": "", "dockerfile": $df}]')
                done
              else
                build=$(echo "$build" | jq -c \
                  --arg ext "$ext" --arg pg "$pg" --arg ver "$ver" \
                  --arg apt "$APT_PACKAGE" --arg df "$dockerfile" \
                  '. + [{"extension": $ext, "pg": $pg, "version": $ver, "arch": "all", "native": false, "apt_package": $apt, "dockerfile": $df}]')
              fi
            done
          done
          echo "extensions=$extensions" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "Building $(echo "$extensions" | jq length) extensions ($(echo "$build" | jq length) build jobs)"

  # Build each architecture natively (no QEMU emulation)
  build:
    needs: matrix
    if: ${{ fromJson(needs.matrix.outputs.build)[0] != null && github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.native && (matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04') || 'ubuntu-24.04' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.build) }}
    # PG 19 is still in beta; allow failures without blocking the pipeline
    continue-on-error: ${{ matrix.pg == '19' }}
    name: build (${{ matrix.extension }}, ${{ matrix.pg }}, ${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        if: ${{ !matrix.native }}
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: extensions/${{ matrix.extension }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.native && format('linux/{0}', matrix.arch) || 'linux/amd64,linux/arm64' }}
          build-args: |
            PG_MAJOR=${{ matrix.pg }}
            PG_TAG=${{ matrix.pg == '19' && '19beta1' || matrix.pg }}
            EXT_VERSION=${{ matrix.version }}
            APT_PACKAGE=${{ matrix.apt_package }}
            EXT_NAME=${{ matrix.extension }}
            LAYOUT=${{ matrix.pg >= 18 && 'isolated' || 'classic' }}
          push: true
          tags: |
            ${{ matrix.native && format('{0}/{1}/{2}-{3}:{4}-{5}', env.REGISTRY, github.repository_owner, env.PREFIX, matrix.extension, matrix.pg, matrix.arch) || format('{0}/{1}/{2}-{3}:{4}', env.REGISTRY, github.repository_owner, env.PREFIX, matrix.extension, matrix.pg) }}
            ${{ !matrix.native && format('{0}/{1}/{2}-{3}:{4}-{5}', env.REGISTRY, github.repository_owner, env.PREFIX, matrix.extension, matrix.pg, matrix.version) || '' }}
          cache-from: |
            type=gha,scope=${{ matrix.extension }}-${{ matrix.pg }}-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PREFIX }}-${{ matrix.extension }}:buildcache-${{ matrix.pg }}-${{ matrix.arch }}
            ${{ matrix.extension == 'plv8' && format('type=registry,ref={0}/{1}/plv8-v8:{2}', env.REGISTRY, github.repository_owner, matrix.version) || '' }}
            ${{ matrix.vcpkg_version != '' && format('type=registry,ref={0}/{1}/pg-lake-vcpkg:{2}', env.REGISTRY, github.repository_owner, matrix.vcpkg_version) || '' }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.extension }}-${{ matrix.pg }}-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PREFIX }}-${{ matrix.extension }}:buildcache-${{ matrix.pg }}-${{ matrix.arch }},mode=max

  # Merge per-arch images into multi-arch manifest lists (only for native builds)
  manifest:
    needs: [matrix, build]
    if: ${{ fromJson(needs.matrix.outputs.extensions)[0] != null && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.extensions) }}
    # PG 19 is still in beta; allow failures without blocking the pipeline
    continue-on-error: ${{ matrix.pg == '19' }}
    name: manifest (${{ matrix.extension }}, ${{ matrix.pg }})
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest (if per-arch images exist)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PREFIX }}-${{ matrix.extension }}"
          # Only create manifest if per-arch tags exist (native builds)
          if docker buildx imagetools inspect "${IMAGE}:${{ matrix.pg }}-amd64" >/dev/null 2>&1 && \
             docker buildx imagetools inspect "${IMAGE}:${{ matrix.pg }}-arm64" >/dev/null 2>&1; then
            docker buildx imagetools create -t "${IMAGE}:${{ matrix.pg }}" \
              "${IMAGE}:${{ matrix.pg }}-amd64" \
              "${IMAGE}:${{ matrix.pg }}-arm64"
            docker buildx imagetools create -t "${IMAGE}:${{ matrix.pg }}-${{ matrix.version }}" \
              "${IMAGE}:${{ matrix.pg }}-amd64" \
              "${IMAGE}:${{ matrix.pg }}-arm64"
          else
            echo "Skipping manifest (APT-based extension, already multi-arch)"
          fi

  # PR-only: amd64 build check (no push, no arm64)
  build-pr:
    needs: matrix
    if: ${{ fromJson(needs.matrix.outputs.extensions)[0] != null && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.extensions) }}
    # PG 19 is still in beta; allow failures without blocking PRs
    continue-on-error: ${{ matrix.pg == '19' }}
    name: build-pr (${{ matrix.extension }}, ${{ matrix.pg }})
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: extensions/${{ matrix.extension }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          build-args: |
            PG_MAJOR=${{ matrix.pg }}
            PG_TAG=${{ matrix.pg == '19' && '19beta1' || matrix.pg }}
            EXT_VERSION=${{ matrix.version }}
            APT_PACKAGE=${{ matrix.apt_package }}
            EXT_NAME=${{ matrix.extension }}
            LAYOUT=${{ matrix.pg >= 18 && 'isolated' || 'classic' }}
          push: false
          cache-from: type=gha,scope=${{ matrix.extension }}-${{ matrix.pg }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.extension }}-${{ matrix.pg }}-amd64

  profile-images:
    needs: [build, manifest]
    # Run even if some extension builds failed (e.g., PG 19 beta).
    # The profile image for PG 17 doesn't need PG 19 extensions to succeed.
    if: always() && !cancelled() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        profile: [azure, full]
        pg: [17, 18, 19]
    # PG 19 is still in beta; allow failures without blocking the pipeline
    continue-on-error: ${{ matrix.pg == '19' }}
    name: Profile ${{ matrix.profile }} (PG ${{ matrix.pg }})
    steps:
      - uses: actions/checkout@v7

      - name: Tag beta images as major version
        if: matrix.pg == '19'
        run: |
          docker pull postgres:19beta1
          docker tag postgres:19beta1 postgres:19

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push profile image
        run: |
          make image PG=${{ matrix.pg }} PROFILE=${{ matrix.profile }} \
            REGISTRY=${{ env.REGISTRY }}/${{ github.repository_owner }}
          docker tag pglayers-${{ matrix.profile }}:${{ matrix.pg }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/pglayers-${{ matrix.profile }}:${{ matrix.pg }}
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/pglayers-${{ matrix.profile }}:${{ matrix.pg }}
