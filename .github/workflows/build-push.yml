name: Build and Push Extension Images

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'profiles/**'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'profiles/**'
  schedule:
    # Weekly full rebuild (safety net): Sunday 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL major version (blank = all)'
        required: false
      extension:
        description: 'Extension name (blank = all)'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PREFIX: pgx

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2  # Need parent commit for diff

      - name: Build matrix (only changed extensions)
        id: set
        run: |
          pg_filter="${{ github.event.inputs.pg_version }}"
          ext_filter="${{ github.event.inputs.extension }}"

          # Detect which extensions changed (push/PR only)
          changed_exts=""
          if [ -z "$ext_filter" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "${{ github.event_name }}" != "schedule" ]; then
            changed_exts=$(git diff --name-only HEAD~1 -- extensions/ \
              | grep -oP 'extensions/\K[^/]+' | sort -u | tr '\n' ' ')
            # If workflow file changed, rebuild everything
            if git diff --name-only HEAD~1 | grep -q '.github/workflows/build-push.yml'; then
              changed_exts=""
            fi
          fi

          matrix="[]"
          for ext_dir in extensions/*/; do
            ext="$(basename "$ext_dir")"
            # Filter: workflow_dispatch with explicit extension
            [ -n "$ext_filter" ] && [ "$ext" != "$ext_filter" ] && continue
            # Filter: only changed extensions (skip if we have a list and ext isn't in it)
            if [ -n "$changed_exts" ] && ! echo "$changed_exts" | grep -qw "$ext"; then
              continue
            fi
            CI_SKIP=""
            source "$ext_dir/extension.conf"
            # Skip extensions marked as CI_SKIP (still buildable locally)
            [ "${CI_SKIP:-}" = "1" ] && continue
            for pg in 17 18 19; do
              [ -n "$pg_filter" ] && [ "$pg" != "$pg_filter" ] && continue
              ver_var="VERSION_${pg}"
              ver="${!ver_var}"
              [ -z "$ver" ] && continue
              matrix=$(echo "$matrix" | jq -c \
                --arg ext "$ext" \
                --arg pg "$pg" \
                --arg ver "$ver" \
                --arg desc "$DESCRIPTION" \
                '. + [{"extension": $ext, "pg": $pg, "version": $ver, "description": $desc}]')
            done
          done
          echo "include=$matrix" >> "$GITHUB_OUTPUT"
          count=$(echo "$matrix" | jq length)
          echo "Building $count extension/version combinations"

  # Build each architecture natively (no QEMU emulation)
  build:
    needs: matrix
    if: ${{ fromJson(needs.matrix.outputs.include)[0] != null && github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.matrix.outputs.include) }}
        arch: [amd64, arm64]
    name: build (${{ matrix.item.extension }}, ${{ matrix.item.pg }}, ${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: extensions/${{ matrix.item.extension }}
          file: extensions/${{ matrix.item.extension }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: |
            PG_MAJOR=${{ matrix.item.pg }}
            PG_TAG=${{ matrix.item.pg == '19' && '19beta1' || matrix.item.pg }}
            EXT_VERSION=${{ matrix.item.version }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PREFIX }}-${{ matrix.item.extension }}:${{ matrix.item.pg }}-${{ matrix.arch }}
          cache-from: |
            type=gha,scope=${{ matrix.item.extension }}-${{ matrix.item.pg }}-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PREFIX }}-${{ matrix.item.extension }}:buildcache-${{ matrix.item.pg }}-${{ matrix.arch }}
            ${{ matrix.item.extension == 'plv8' && format('type=registry,ref={0}/{1}/plv8-v8:{2}', env.REGISTRY, github.repository_owner, matrix.item.version) || '' }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.item.extension }}-${{ matrix.item.pg }}-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PREFIX }}-${{ matrix.item.extension }}:buildcache-${{ matrix.item.pg }}-${{ matrix.arch }},mode=max

  # Merge per-arch images into multi-arch manifest lists
  manifest:
    needs: [matrix, build]
    if: ${{ fromJson(needs.matrix.outputs.include)[0] != null && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    name: manifest (${{ matrix.extension }}, ${{ matrix.pg }})
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PREFIX }}-${{ matrix.extension }}"
          docker manifest create "${IMAGE}:${{ matrix.pg }}" \
            "${IMAGE}:${{ matrix.pg }}-amd64" \
            "${IMAGE}:${{ matrix.pg }}-arm64"
          docker manifest push "${IMAGE}:${{ matrix.pg }}"

          docker manifest create "${IMAGE}:${{ matrix.pg }}-${{ matrix.version }}" \
            "${IMAGE}:${{ matrix.pg }}-amd64" \
            "${IMAGE}:${{ matrix.pg }}-arm64"
          docker manifest push "${IMAGE}:${{ matrix.pg }}-${{ matrix.version }}"

  # PR-only: amd64 build check (no push, no arm64)
  build-pr:
    needs: matrix
    if: ${{ fromJson(needs.matrix.outputs.include)[0] != null && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    name: build-pr (${{ matrix.extension }}, ${{ matrix.pg }})
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: extensions/${{ matrix.extension }}
          file: extensions/${{ matrix.extension }}/Dockerfile
          platforms: linux/amd64
          build-args: |
            PG_MAJOR=${{ matrix.pg }}
            PG_TAG=${{ matrix.pg == '19' && '19beta1' || matrix.pg }}
            EXT_VERSION=${{ matrix.version }}
          push: false
          cache-from: type=gha,scope=${{ matrix.extension }}-${{ matrix.pg }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.extension }}-${{ matrix.pg }}-amd64

  profile-images:
    needs: [build, manifest]
    # Run even if some extension builds failed (e.g., PG 19 beta).
    # The profile image for PG 17 doesn't need PG 19 extensions to succeed.
    if: always() && !cancelled() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        profile: [azure, full]
        pg: [17, 18, 19]
    name: Profile ${{ matrix.profile }} (PG ${{ matrix.pg }})
    steps:
      - uses: actions/checkout@v7

      - name: Tag beta images as major version
        if: matrix.pg == '19'
        run: |
          docker pull postgres:19beta1
          docker tag postgres:19beta1 postgres:19

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push profile image
        run: |
          make image PG=${{ matrix.pg }} PROFILE=${{ matrix.profile }} \
            REGISTRY=${{ env.REGISTRY }}/${{ github.repository_owner }}
          docker tag pglayers-${{ matrix.profile }}:${{ matrix.pg }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/pglayers-${{ matrix.profile }}:${{ matrix.pg }}
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/pglayers-${{ matrix.profile }}:${{ matrix.pg }}
