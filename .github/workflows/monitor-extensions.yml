name: Monitor Extension Versions

on:
  schedule:
    # Daily at 08:00 UTC: check for new upstream releases
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Use PAT so that pushes and PRs trigger downstream workflows.
          # Falls back to GITHUB_TOKEN if PAT_TOKEN is not set.
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check for extension updates
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Extensions pinned to a branch or with complex tag formats not yet handled
          SKIP_MONITOR="age pgjwt"

          # ============================================================
          # Download PGDG APT package index (used for APT-based extensions)
          # ============================================================
          PGDG_DIST="trixie-pgdg"
          PACKAGES_URL="https://apt.postgresql.org/pub/repos/apt/dists/${PGDG_DIST}/main/binary-amd64/Packages.gz"
          curl -sf "$PACKAGES_URL" | zcat > /tmp/pgdg-packages.txt

          # Helper: get upstream version of an APT package from the PGDG index.
          # Strips the Debian revision suffix (e.g., "0.8.3-1.pgdg13+1" -> "0.8.3").
          apt_version() {
            local pkg="$1"
            awk -v p="$pkg" '
              /^Package: /{found=($2==p)}
              found && /^Version:/{print $2; exit}
            ' /tmp/pgdg-packages.txt | sed 's/-[0-9].*$//' | sed 's/+dfsg.*$//'
          }

          for dir in extensions/*/; do
            ext="$(basename "$dir")"

            # Skip extensions with no tagged releases
            if echo "$SKIP_MONITOR" | grep -qw "$ext"; then
              echo "SKIP $ext (pinned to branch, no releases)"
              continue
            fi

            # Source extension config
            # shellcheck disable=SC1091,SC2034
            # SC1091: dynamic path; SC2034: variables used indirectly
            source "$dir/extension.conf"

            # APT-based extensions are not version-monitored: apt installs the
            # latest PGDG package at build time and the version/tag is derived
            # from PGDG, so there is no VERSION_XX to bump here.
            if [ -n "${APT_PACKAGE:-}" ]; then
              echo "SKIP $ext (APT-managed; version resolved from PGDG at build)"
              APT_PACKAGE=""
              continue
            fi

            # Get the current version (use first available PG version)
            current=""
            for pg in 17 18 19; do
              ver_var="VERSION_${pg}"
              ver="${!ver_var:-}"
              if [ -n "$ver" ]; then
                current="$ver"
                break
              fi
            done

            if [ -z "$current" ]; then
              echo "SKIP $ext (no VERSION_* defined)"
              continue
            fi

            # Determine tag filter pattern (for source-built extensions)
            tag_filter="${TAG_FILTER:-}"
            TAG_FILTER=""

            # ============================================================
            # APT-based extensions: check PGDG repository
            # ============================================================
            apt_pkg="${APT_PACKAGE:-}"
            APT_PACKAGE=""  # Reset for next iteration

            if [ -n "$apt_pkg" ]; then
              # Query APT versions for each PG version
              latest=""
              for pg in 17 18 19; do
                ver_var="VERSION_${pg}"
                [ -z "${!ver_var:-}" ] && continue
                pkg_name="postgresql-${pg}-${apt_pkg}"
                apt_ver="$(apt_version "$pkg_name")"
                if [ -n "$apt_ver" ] && [ -z "$latest" ]; then
                  latest="$apt_ver"
                fi
              done

              if [ -z "$latest" ]; then
                echo "WARN $ext: no APT package found in PGDG repo"
                continue
              fi

              # Normalize current version for comparison (strip v prefix,
              # common tag prefixes like REL, ver_, VERSION_, wal2json_)
              current_norm="$current"
              current_norm="${current_norm#v}"
              current_norm="${current_norm#REL}"
              current_norm="${current_norm#ver_}"
              current_norm="${current_norm#VERSION_}"
              current_norm="${current_norm#wal2json_}"
              # Convert underscores to dots for version comparison
              current_norm="${current_norm//_/.}"

              latest_norm="$latest"

              if [ "$current_norm" = "$latest_norm" ]; then
                echo "OK   $ext: ${current} = apt:${latest} (up to date)"
                continue
              fi

              # Reject downgrades
              if [ "$(printf '%s\n%s\n' "$current_norm" "$latest_norm" | sort -V | tail -1)" = "$current_norm" ]; then
                echo "OK   $ext: ${current} (up to date, APT ${latest} is older)"
                continue
              fi

              echo "UPDATE $ext: ${current} -> ${latest} (from PGDG APT)"

              # Derive release/compare URLs from upstream repo
              repo_url="$REPO"
              owner_repo=$(echo "$repo_url" | sed -n 's|.*github\.com[:/]\([^/]*/[^/.]*\).*|\1|p')
              release_url="https://github.com/${owner_repo}/releases"
              compare_url="$release_url"

              # Check if a PR already exists
              branch="deps/update-${ext}-${latest}"
              existing_pr=$(gh pr list --head "$branch" --state open --json number --jq 'length' 2>/dev/null) || existing_pr=0
              if [ "$existing_pr" -gt 0 ]; then
                echo "  PR already open for $ext, skipping"
                continue
              fi

              # Create update branch
              git push origin --delete "$branch" 2>/dev/null || true
              git checkout -b "$branch" 2>/dev/null || {
                echo "  Branch $branch already exists locally, skipping"
                git checkout main 2>/dev/null
                continue
              }

              # Update VERSION_* fields per PG version from APT
              conf_file="extensions/${ext}/extension.conf"
              for pg in 17 18 19; do
                ver_var="VERSION_${pg}"
                old_ver="${!ver_var:-}"
                [ -z "$old_ver" ] && continue
                pkg_name="postgresql-${pg}-${apt_pkg}"
                new_ver="$(apt_version "$pkg_name")"
                [ -z "$new_ver" ] && continue
                sed -i "s|^VERSION_${pg}=.*|VERSION_${pg}=\"${new_ver}\"|" "$conf_file"
              done

              # Build PR body
              pr_body="PGDG APT repository updated **${ext}** to \`${latest}\`."
              pr_body+=$'\n\n'
              pr_body+="**Current version:** \`${current}\`"
              pr_body+=$'\n'
              pr_body+="**APT version:** \`${latest}\`"
              pr_body+=$'\n\n'
              pr_body+="Package: \`postgresql-17-${apt_pkg}\`"
              pr_body+=$'\n'
              pr_body+="[Upstream releases](${release_url})"
              pr_body+=$'\n\n'
              pr_body+="---"
              pr_body+=$'\n'
              pr_body+="*Automated by monitor-extensions workflow (APT source).*"

              # Commit, push, and open PR
              git add "$conf_file"
              git commit -m "deps(${ext}): update to ${latest} (APT)"
              git push -u origin "$branch"

              if gh pr create \
                --title "deps(${ext}): update to ${latest}" \
                --body "$pr_body" \
                --base main \
                --head "$branch"; then
                gh pr merge "$branch" --auto --squash
              else
                echo "  WARN: failed to create PR for $ext"
              fi

              git checkout main 2>/dev/null
              continue
            fi

            # ============================================================
            # Source-built extensions: check GitHub/GitLab releases
            # ============================================================
            repo_url="$REPO"
            if echo "$repo_url" | grep -q "github.com"; then
              api_type="github"
              owner_repo=$(echo "$repo_url" | sed -n 's|.*github\.com[:/]\([^/]*/[^/.]*\).*|\1|p')
            elif echo "$repo_url" | grep -q "gitlab.com"; then
              api_type="gitlab"
              project_path=$(echo "$repo_url" | sed -n 's|.*gitlab\.com[:/]\([^.]*\).*|\1|p')
              project_encoded="${project_path//\//%2F}"
            else
              echo "SKIP $ext (unsupported host: $repo_url)"
              continue
            fi

            # Fetch latest version from upstream
            latest=""
            if [ "$api_type" = "github" ]; then
              if [ -n "$tag_filter" ]; then
                resolved_filter="$tag_filter"
                # shellcheck disable=SC2016
                # Literal ${PG} match is intentional -- it's a placeholder in TAG_FILTER
                if echo "$tag_filter" | grep -q '\${PG}'; then
                  for pg in 17 18 19; do
                    ver_var="VERSION_${pg}"
                    if [ -n "${!ver_var:-}" ]; then
                      resolved_filter="${tag_filter//\$\{PG\}/$pg}"
                      break
                    fi
                  done
                fi
                latest=$(gh api "repos/${owner_repo}/tags" --paginate --jq '.[].name' 2>/dev/null \
                  | grep -E "$resolved_filter" \
                  | grep -viE '(alpha|beta|rc|dev|pre|snapshot)' \
                  | sort -V \
                  | tail -1) || true
              else
                if gh api "repos/${owner_repo}/releases/latest" --jq '.tag_name' > /tmp/latest_ver 2>/dev/null; then
                  latest=$(cat /tmp/latest_ver)
                fi
                if [ -z "$latest" ]; then
                  latest=$(gh api "repos/${owner_repo}/tags" --paginate --jq '.[].name' 2>/dev/null \
                    | grep -viE '(alpha|beta|rc|dev|pre|snapshot)' \
                    | grep -E '^v?[0-9]' \
                    | sort -V \
                    | tail -1) || true
                fi
              fi
            elif [ "$api_type" = "gitlab" ]; then
              latest=$(curl -sf "https://gitlab.com/api/v4/projects/${project_encoded}/releases" \
                | jq -r '[.[] | select(.upcoming_release != true)] | first | .tag_name // empty' 2>/dev/null) || true
            fi

            if [ -z "$latest" ]; then
              echo "WARN $ext: could not determine latest version"
              continue
            fi

            # Compare versions
            if [ "$latest" = "$current" ]; then
              echo "OK   $ext: ${current} (up to date)"
              continue
            fi

            current_norm="${current#v}"
            latest_norm="${latest#v}"
            if [ "$current_norm" = "$latest_norm" ]; then
              echo "OK   $ext: ${current} (up to date, prefix difference only)"
              continue
            fi

            # Reject downgrades
            if [ "$(printf '%s\n%s\n' "$current_norm" "$latest_norm" | sort -V | tail -1)" = "$current_norm" ]; then
              echo "OK   $ext: ${current} (up to date, latest release ${latest} is older)"
              continue
            fi

            echo "UPDATE $ext: ${current} -> ${latest}"

            # Check if a PR already exists
            branch="deps/update-${ext}-${latest}"
            existing_pr=$(gh pr list --head "$branch" --state open --json number --jq 'length' 2>/dev/null) || existing_pr=0
            if [ "$existing_pr" -gt 0 ]; then
              echo "  PR already open for $ext, skipping"
              continue
            fi

            # Create update branch
            git push origin --delete "$branch" 2>/dev/null || true
            git checkout -b "$branch" 2>/dev/null || {
              echo "  Branch $branch already exists locally, skipping"
              git checkout main 2>/dev/null
              continue
            }

            # Update VERSION_* fields
            conf_file="extensions/${ext}/extension.conf"
            for pg in 17 18 19; do
              ver_var="VERSION_${pg}"
              old_ver="${!ver_var:-}"
              [ -z "$old_ver" ] && continue
              new_ver="$latest"
              # shellcheck disable=SC2016
              # Literal ${PG} match is intentional
              if echo "$tag_filter" | grep -q '\${PG}'; then
                pg_filter="${tag_filter//\$\{PG\}/$pg}"
                pg_latest=$(gh api "repos/${owner_repo}/tags" --paginate --jq '.[].name' 2>/dev/null \
                  | grep -E "$pg_filter" \
                  | grep -viE '(alpha|beta|rc|dev|pre|snapshot)' \
                  | sort -V \
                  | tail -1) || true
                [ -n "$pg_latest" ] && new_ver="$pg_latest"
              fi
              sed -i "s|^VERSION_${pg}=.*|VERSION_${pg}=\"${new_ver}\"|" "$conf_file"
            done

            # Build PR body
            if [ "$api_type" = "github" ]; then
              release_url="https://github.com/${owner_repo}/releases/tag/${latest}"
              compare_url="https://github.com/${owner_repo}/compare/${current}...${latest}"
            else
              release_url="https://gitlab.com/${project_path}/-/releases/${latest}"
              compare_url="https://gitlab.com/${project_path}/-/compare/${current}...${latest}"
            fi

            pr_body="Upstream [${ext}](${repo_url%.git}) released "
            pr_body+="[${latest}](${release_url})."
            pr_body+=$'\n\n'
            pr_body+="**Current version:** \`${current}\`"
            pr_body+=$'\n'
            pr_body+="**New version:** \`${latest}\`"
            pr_body+=$'\n\n'
            pr_body+="[Changelog](${release_url})"
            pr_body+=" | [Compare](${compare_url})"
            pr_body+=$'\n\n'
            pr_body+="---"
            pr_body+=$'\n'
            pr_body+="*Automated by monitor-extensions workflow (source build).*"

            # Commit, push, and open PR
            git add "$conf_file"
            git commit -m "deps(${ext}): update to ${latest}"
            git push -u origin "$branch"

            if gh pr create \
              --title "deps(${ext}): update to ${latest}" \
              --body "$pr_body" \
              --base main \
              --head "$branch"; then
              gh pr merge "$branch" --auto --squash
            else
              echo "  WARN: failed to create PR for $ext (check repo Actions permissions)"
            fi

            git checkout main 2>/dev/null
          done
