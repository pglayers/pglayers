name: Monitor Base Image

on:
  schedule:
    # Every 6 hours: check if the official postgres images have been rebuilt
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-digests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check base image digests
        id: check
        run: |
          DIGEST_FILE=".github/base-image-digests.json"
          CHANGED_VERSIONS=""

          # Initialize if file doesn't exist
          if [ ! -f "$DIGEST_FILE" ]; then
            echo '{}' > "$DIGEST_FILE"
          fi

          for pg in 17 18 19; do
            # Get current manifest digest from Docker Hub
            current=$(docker buildx imagetools inspect \
              --raw "docker.io/library/postgres:${pg}" 2>/dev/null \
              | sha256sum | awk '{print "sha256:"$1}')

            if [ -z "$current" ] || [ "$current" = "sha256:" ]; then
              echo "::warning::Failed to fetch digest for postgres:${pg}"
              continue
            fi

            # Get stored digest
            stored=$(jq -r ".\"postgres:${pg}\" // \"\"" "$DIGEST_FILE")

            if [ "$current" != "$stored" ]; then
              echo "postgres:${pg} changed: ${stored:-<new>} -> ${current}"
              CHANGED_VERSIONS="${CHANGED_VERSIONS:+${CHANGED_VERSIONS} }${pg}"
              # Update the file
              jq --arg key "postgres:${pg}" --arg val "$current" \
                '.[$key] = $val' "$DIGEST_FILE" > tmp.json && mv tmp.json "$DIGEST_FILE"
            else
              echo "postgres:${pg} unchanged: ${current}"
            fi
          done

          echo "changed=${CHANGED_VERSIONS}" >> "$GITHUB_OUTPUT"

      - name: Create PR with updated digests
        if: steps.check.outputs.changed != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          changed="${{ steps.check.outputs.changed }}"
          branch="auto/base-image-update"

          # Close any existing PR from a previous run
          existing_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "Closing existing PR #${existing_pr}"
            gh pr close "$existing_pr" --delete-branch
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add .github/base-image-digests.json
          git commit -m "chore: base image updated (PG ${changed})"
          git push --force origin "$branch"

          gh pr create \
            --title "chore: base image updated (PG ${changed})" \
            --body "The official \`postgres\` Docker images have been rebuilt for PG ${changed}.

          This PR updates the tracked digests. Once status checks pass, it will auto-merge and trigger a rebuild." \
            --head "$branch" \
            --base main

          gh pr merge "$branch" --auto --squash

      - name: Trigger rebuild for changed versions
        if: steps.check.outputs.changed != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          changed="${{ steps.check.outputs.changed }}"
          # If multiple versions changed, rebuild everything
          if [ "$(echo "$changed" | wc -w)" -gt 1 ]; then
            echo "Multiple versions changed, triggering full rebuild"
            gh workflow run build-push.yml
          else
            echo "Triggering rebuild for PG ${changed}"
            gh workflow run build-push.yml -f pg_version="${changed}"
          fi
