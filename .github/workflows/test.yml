name: Test Extensions

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'profiles/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL major version (blank = all)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PRs: test PG 17 only (saves ~66% time). Push to main: all versions.
        pg: ${{ fromJson( github.event.inputs.pg_version && format('["{0}"]', github.event.inputs.pg_version) || (github.event_name == 'pull_request' && '["17"]' || '["17", "18", "19"]') ) }}
    # PG 19 is still in beta; allow failures without blocking the pipeline
    continue-on-error: ${{ matrix.pg == '19' }}
    name: Test PG ${{ matrix.pg }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2  # Need parent commit for diff

      - name: Detect changed extensions
        id: changes
        run: |
          # For PRs, checkout creates a merge commit: HEAD^1 is the base.
          # For pushes, HEAD~1 is the previous commit. Both cases work with HEAD~1.
          changed=$(git diff --name-only HEAD~1 -- extensions/ \
            | grep -oP 'extensions/\K[^/]+' | sort -u | tr '\n' ' ')
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          if [ -n "$changed" ]; then
            echo "Changed extensions: $changed"
          else
            echo "No targeted changes detected, will build all"
          fi

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af
          df -h /

      - name: Tag beta images as major version
        run: |
          # PG 19 is currently in beta; tag the beta image so our
          # Dockerfiles (which use postgres:${PG_MAJOR}) can find it
          if [ "${{ matrix.pg }}" = "19" ]; then
            docker pull postgres:19beta1
            docker tag postgres:19beta1 postgres:19
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pull pre-built extension images
        env:
          REGISTRY: ghcr.io/pglayers
          PREFIX: pgx
        run: |
          # Pull pre-built images for unchanged extensions from the registry
          for ext in extensions/*/; do
            ext="$(basename "$ext")"
            changed="${{ steps.changes.outputs.changed }}"
            if [ -n "$changed" ] && echo "$changed" | grep -qw "$ext"; then
              echo "SKIP pull $ext (will build from source)"
              continue
            fi
            # Skip CI_SKIP extensions (long builds not available in registry)
            ci_skip=$(bash -c "source extensions/$ext/extension.conf && echo \${CI_SKIP:-}")
            if [ "$ci_skip" = "1" ]; then
              echo "SKIP pull $ext (CI_SKIP=1)"
              continue
            fi
            ver=$(bash -c "source extensions/$ext/extension.conf && echo \${VERSION_${{ matrix.pg }}}")
            [ -z "$ver" ] && continue
            img="${REGISTRY}/${PREFIX}-${ext}:${{ matrix.pg }}"
            if docker pull "$img" 2>/dev/null; then
              # For PG 18+, verify the image uses the isolated layout.
              # Stale images built before isolated layout was introduced have
              # files at /usr/lib/... (classic) instead of /lib/ (isolated).
              # Note: isolated images are FROM scratch (no shell), so we check
              # via docker export + tar.
              if [ "${{ matrix.pg }}" -ge 18 ]; then
                cid=$(docker create "$img" true 2>/dev/null)
                has_isolated=$(docker export "$cid" 2>/dev/null \
                  | tar -t 2>/dev/null | grep -q '^lib/\|^share/extension/' && echo yes || echo no)
                docker rm "$cid" >/dev/null 2>&1
                if [ "$has_isolated" != "yes" ]; then
                  echo "SKIP $ext (stale classic-layout image, will rebuild)"
                  docker rmi "$img" 2>/dev/null || true
                  continue
                fi
              fi
              # Re-tag as local/ so make test finds it
              docker tag "$img" "local/${PREFIX}-${ext}:${{ matrix.pg }}"
            else
              echo "WARN: $img not available, will build from source"
            fi
          done

      - name: Build changed extensions (PG ${{ matrix.pg }})
        if: steps.changes.outputs.changed != ''
        env:
          DOCKER_BUILDKIT: 1
          PG_TAG: ${{ matrix.pg == '19' && '19beta1' || matrix.pg }}
        run: |
          for ext in ${{ steps.changes.outputs.changed }}; do
            ver=$(bash -c "source extensions/$ext/extension.conf && echo \${VERSION_${{ matrix.pg }}}")
            if [ -z "$ver" ]; then
              echo "SKIP $ext (no version for PG ${{ matrix.pg }})"
              continue
            fi
            make build EXT="$ext" PG=${{ matrix.pg }} PG_TAG="$PG_TAG" REGISTRY=local CACHE_SCOPE=ci || exit 1
          done

      - name: Build unpulled extensions (PG ${{ matrix.pg }})
        env:
          DOCKER_BUILDKIT: 1
          PG_TAG: ${{ matrix.pg == '19' && '19beta1' || matrix.pg }}
        run: |
          # Build any extension that wasn't pulled from the registry
          # (new extensions, CI_SKIP extensions not in GHCR, etc.)
          for ext in extensions/*/; do
            ext="$(basename "$ext")"
            ver=$(bash -c "source extensions/$ext/extension.conf && echo \${VERSION_${{ matrix.pg }}}")
            [ -z "$ver" ] && continue
            # Already have it (pulled or built above)
            if docker image inspect "local/pgx-${ext}:${{ matrix.pg }}" >/dev/null 2>&1; then
              continue
            fi
            echo "Building $ext (not available in registry)"
            make build EXT="$ext" PG=${{ matrix.pg }} PG_TAG="$PG_TAG" REGISTRY=local CACHE_SCOPE=ci || exit 1
          done

      - name: Run test suite (PG ${{ matrix.pg }})
        env:
          PG_TAG: ${{ matrix.pg == '19' && '19beta1' || matrix.pg }}
        run: make test REGISTRY=local PG=${{ matrix.pg }} PG_TAG="$PG_TAG"

      - name: Check profiles
        run: make check-profiles

  test-profile:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [azure]
        # PRs: PG 17 only. Push to main: all versions.
        pg: ${{ fromJson( github.event.inputs.pg_version && format('["{0}"]', github.event.inputs.pg_version) || (github.event_name == 'pull_request' && '["17"]' || '["17", "18", "19"]') ) }}
    continue-on-error: ${{ matrix.pg == '19' }}
    name: Test profile ${{ matrix.profile }} (PG ${{ matrix.pg }})
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af

      - name: Tag beta images as major version
        if: matrix.pg == '19'
        run: |
          docker pull postgres:19beta1
          docker tag postgres:19beta1 postgres:19

      - name: Pull extension images from registry
        env:
          REGISTRY: ghcr.io/pglayers
          PREFIX: pgx
        run: |
          for ext in $(grep -v '^\#' profiles/${{ matrix.profile }}.txt | grep -v '^$'); do
            ci_skip=$(bash -c "source extensions/$ext/extension.conf && echo \${CI_SKIP:-}")
            if [ "$ci_skip" = "1" ]; then
              echo "SKIP $ext (CI_SKIP=1)"
              continue
            fi
            ver=$(bash -c "source extensions/$ext/extension.conf && echo \${VERSION_${{ matrix.pg }}}")
            [ -z "$ver" ] && continue
            img="${REGISTRY}/${PREFIX}-${ext}:${{ matrix.pg }}"
            if docker pull "$img" 2>/dev/null; then
              docker tag "$img" "local/${PREFIX}-${ext}:${{ matrix.pg }}"
            else
              echo "WARN: $img not available, will skip"
            fi
          done

      - name: Build profile image
        run: make image PG=${{ matrix.pg }} PROFILE=${{ matrix.profile }} REGISTRY=local

      - name: Test profile image
        run: make test-image PG=${{ matrix.pg }}
