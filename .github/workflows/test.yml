name: Test Extensions

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'profiles/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL major version (blank = all)'
        required: false
        default: ''
      profile:
        description: 'Profile name (blank = full test without profile)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PRs: test PG 17 only (saves ~66% time). Push to main: all versions.
        pg: ${{ fromJson( github.event.inputs.pg_version && format('["{0}"]', github.event.inputs.pg_version) || (github.event_name == 'pull_request' && '["17"]' || '["17", "18", "19"]') ) }}
    name: Test PG ${{ matrix.pg }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2  # Need parent commit for diff

      - name: Detect changed extensions
        id: changes
        run: |
          # For PRs, checkout creates a merge commit: HEAD^1 is the base.
          # For pushes, HEAD~1 is the previous commit. Both cases work with HEAD~1.
          changed=$(git diff --name-only HEAD~1 -- extensions/ \
            | grep -oP 'extensions/\K[^/]+' | sort -u | tr '\n' ' ')
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          if [ -n "$changed" ]; then
            echo "Changed extensions: $changed"
          else
            echo "No targeted changes detected, will build all"
          fi

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af
          df -h /

      - name: Tag beta images as major version
        run: |
          # PG 19 is currently in beta; tag the beta image so our
          # Dockerfiles (which use postgres:${PG_MAJOR}) can find it
          if [ "${{ matrix.pg }}" = "19" ]; then
            docker pull postgres:19beta1
            docker tag postgres:19beta1 postgres:19
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pull pre-built extension images
        if: steps.changes.outputs.changed != ''
        env:
          REGISTRY: ghcr.io/pglayers
          PREFIX: pgx
        run: |
          # Pull pre-built images for unchanged extensions from the registry
          for ext in extensions/*/; do
            ext="$(basename "$ext")"
            changed="${{ steps.changes.outputs.changed }}"
            if echo "$changed" | grep -qw "$ext"; then
              echo "SKIP pull $ext (will build from source)"
              continue
            fi
            # Skip CI_SKIP extensions (long builds not available in registry)
            ci_skip=$(bash -c "source extensions/$ext/extension.conf && echo \${CI_SKIP:-}")
            if [ "$ci_skip" = "1" ]; then
              echo "SKIP pull $ext (CI_SKIP=1)"
              continue
            fi
            ver=$(bash -c "source extensions/$ext/extension.conf && echo \${VERSION_${{ matrix.pg }}}")
            [ -z "$ver" ] && continue
            img="${REGISTRY}/${PREFIX}-${ext}:${{ matrix.pg }}"
            if docker pull "$img" 2>/dev/null; then
              # Re-tag as local/ so make test finds it
              docker tag "$img" "local/${PREFIX}-${ext}:${{ matrix.pg }}"
            else
              echo "WARN: $img not available, will skip in tests"
            fi
          done

      - name: Build changed extensions (PG ${{ matrix.pg }})
        if: steps.changes.outputs.changed != ''
        env:
          DOCKER_BUILDKIT: 1
        run: |
          for ext in ${{ steps.changes.outputs.changed }}; do
            ver=$(bash -c "source extensions/$ext/extension.conf && echo \${VERSION_${{ matrix.pg }}}")
            if [ -z "$ver" ]; then
              echo "SKIP $ext (no version for PG ${{ matrix.pg }})"
              continue
            fi
            make build EXT="$ext" PG=${{ matrix.pg }} REGISTRY=local CACHE_SCOPE=ci || exit 1
          done

      - name: Build all extensions (PG ${{ matrix.pg }})
        if: steps.changes.outputs.changed == ''
        env:
          DOCKER_BUILDKIT: 1
        run: make build-all PG=${{ matrix.pg }} REGISTRY=local CACHE_SCOPE=ci

      - name: Run test suite (PG ${{ matrix.pg }})
        run: make test REGISTRY=local PG=${{ matrix.pg }}

      - name: Check profiles
        run: make check-profiles

  test-profiles:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        pg: ${{ fromJson( github.event.inputs.pg_version && format('["{0}"]', github.event.inputs.pg_version) || (github.event_name == 'pull_request' && '["17"]' || '["17", "18", "19"]') ) }}
        profile: [azure]
    name: Test profile ${{ matrix.profile }} (PG ${{ matrix.pg }})
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Detect changed extensions
        id: changes
        run: |
          changed=$(git diff --name-only HEAD~1 -- extensions/ \
            | grep -oP 'extensions/\K[^/]+' | sort -u | tr '\n' ' ')
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af
          df -h /

      - name: Tag beta images as major version
        run: |
          if [ "${{ matrix.pg }}" = "19" ]; then
            docker pull postgres:19beta1
            docker tag postgres:19beta1 postgres:19
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pull pre-built extension images
        if: steps.changes.outputs.changed != ''
        env:
          REGISTRY: ghcr.io/pglayers
          PREFIX: pgx
        run: |
          profile_exts=$(grep -v '^\#' profiles/${{ matrix.profile }}.txt | grep -v '^$')
          for ext in $profile_exts; do
            changed="${{ steps.changes.outputs.changed }}"
            if echo "$changed" | grep -qw "$ext"; then
              echo "SKIP pull $ext (will build from source)"
              continue
            fi
            ver=$(bash -c "source extensions/$ext/extension.conf && echo \${VERSION_${{ matrix.pg }}}")
            [ -z "$ver" ] && continue
            img="${REGISTRY}/${PREFIX}-${ext}:${{ matrix.pg }}"
            if docker pull "$img" 2>/dev/null; then
              docker tag "$img" "local/${PREFIX}-${ext}:${{ matrix.pg }}"
            else
              echo "WARN: $img not available, will skip in tests"
            fi
          done

      - name: Build changed extensions (PG ${{ matrix.pg }}, profile ${{ matrix.profile }})
        if: steps.changes.outputs.changed != ''
        env:
          DOCKER_BUILDKIT: 1
        run: |
          profile_exts=$(grep -v '^\#' profiles/${{ matrix.profile }}.txt | grep -v '^$')
          for ext in ${{ steps.changes.outputs.changed }}; do
            # Only build if the extension is in this profile
            if echo "$profile_exts" | grep -qw "$ext"; then
              ver=$(bash -c "source extensions/$ext/extension.conf && echo \${VERSION_${{ matrix.pg }}}")
              if [ -z "$ver" ]; then
                echo "SKIP $ext (no version for PG ${{ matrix.pg }})"
                continue
              fi
              make build EXT="$ext" PG=${{ matrix.pg }} REGISTRY=local CACHE_SCOPE=ci || exit 1
            fi
          done

      - name: Build all profile extensions (PG ${{ matrix.pg }}, profile ${{ matrix.profile }})
        if: steps.changes.outputs.changed == ''
        env:
          DOCKER_BUILDKIT: 1
        run: make build-all PG=${{ matrix.pg }} PROFILE=${{ matrix.profile }} REGISTRY=local CACHE_SCOPE=ci

      - name: Run profile test suite (PG ${{ matrix.pg }}, profile ${{ matrix.profile }})
        run: make test REGISTRY=local PG=${{ matrix.pg }} PROFILE=${{ matrix.profile }}
