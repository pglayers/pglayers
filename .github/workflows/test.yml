name: Test Extensions

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL major version (blank = all)'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PRs: test PG 17 only (saves ~66% time). Push to main: all versions.
        pg: ${{ fromJson( github.event.inputs.pg_version && format('["{0}"]', github.event.inputs.pg_version) || (github.event_name == 'pull_request' && '["17"]' || '["17", "18", "19"]') ) }}
    name: Test PG ${{ matrix.pg }}
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af
          df -h /

      - name: Tag beta images as major version
        run: |
          # PG 19 is currently in beta; tag the beta image so our
          # Dockerfiles (which use postgres:${PG_MAJOR}) can find it
          if [ "${{ matrix.pg }}" = "19" ]; then
            docker pull postgres:19beta1
            docker tag postgres:19beta1 postgres:19
          fi

      - name: Build all extensions (PG ${{ matrix.pg }})
        env:
          DOCKER_BUILDKIT: 1
        run: make build-all PG=${{ matrix.pg }} REGISTRY=local

      - name: Run test suite (PG ${{ matrix.pg }})
        run: make test REGISTRY=local PG=${{ matrix.pg }}
