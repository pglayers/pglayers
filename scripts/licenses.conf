# Licensing policy for pglayers extensions.
#
# shellcheck shell=bash
# shellcheck disable=SC2034  # sourced by scripts/check-licenses.sh
#
# pglayers only ships extensions under permissive (or safe weak-copyleft)
# licenses. This file is the single source of truth for the automated gate
# (scripts/check-licenses.sh, run by `make check-licenses`). It is sourced as
# shell -- keep it to plain variable assignments.
#
# Classification for an extension's declared LICENSE (in extension.conf):
#   1. If the extension is in LICENSE_EXCEPTIONS, it is accepted (a deliberate,
#      documented deviation -- e.g. GPL geospatial extensions loaded at runtime).
#   2. Else if the (normalized) license is in ALLOW_LICENSES, it is accepted.
#   3. Else if it is in DENY_LICENSES, it is rejected.
#   4. Otherwise it is "needs review": rejected until someone either adds the
#      license to ALLOW_LICENSES or records an explicit exception here.

# Permissive and safe weak/file-level-copyleft licenses -- auto-accepted.
# Weak copyleft (MPL-2.0) and permissive-classified (Artistic-2.0) are safe
# for our model: extensions are separate .so files loaded at runtime, never
# statically linked into a combined derivative work.
ALLOW_LICENSES="
PostgreSQL
MIT
ISC
Zlib
Apache-2.0
BSD-0-Clause
BSD-2-Clause
BSD-3-Clause
MPL-2.0
Artistic-2.0
"

# Source-available or infectious copyleft licenses -- never accepted without
# an explicit, documented exception. Combining these into the shipped image is
# either legally infectious (AGPL, GPL, LGPL when linked) or violates the
# open-source distribution model (BSL/SSPL/FSL/ELv2 are source-available).
DENY_LICENSES="
AGPL-1.0
AGPL-3.0
GPL-2.0
GPL-2.0-only
GPL-2.0-or-later
GPL-3.0
GPL-3.0-only
GPL-3.0-or-later
LGPL-2.1
LGPL-3.0
SSPL-1.0
BSL-1.1
BUSL-1.1
Elastic-2.0
FSL-1.1
FSL-1.1-ALv2
FSL-1.1-MIT
"

# Per-extension exceptions: deliberate, documented deviations from the deny
# list. Format: one "ext=license" per line in LICENSE_EXCEPTIONS, with a
# matching rationale in LICENSE_EXCEPTION_REASON keyed by ext. The declared
# LICENSE in extension.conf must match the license recorded here.
LICENSE_EXCEPTIONS="
postgis=GPL-2.0-or-later
pgrouting=GPL-2.0
"

# Rationale for each exception (ext|reason), for the audit trail.
LICENSE_EXCEPTION_REASON="
postgis|GPL geospatial extension loaded as a separate .so at runtime (mere aggregation, not a derivative of the combined image); standard PostGIS distribution practice.
pgrouting|Same as postgis: GPL extension loaded at runtime alongside (and depending on) PostGIS, not linked into the combined image.
"

# Normalization: map common license aliases to the canonical SPDX id used
# above. Format: "alias=canonical" per line.
LICENSE_ALIASES="
BSD=BSD-3-Clause
BSD-3=BSD-3-Clause
BSD-2=BSD-2-Clause
BSD-3-clause=BSD-3-Clause
BSD-2-clause=BSD-2-Clause
Expat=MIT
GPLv2=GPL-2.0
GPLv3=GPL-3.0
GPL-2=GPL-2.0
GPL-3=GPL-3.0
GPL-2+=GPL-2.0-or-later
GPL-3+=GPL-3.0-or-later
Apache2=Apache-2.0
Apache-2=Apache-2.0
MPL2=MPL-2.0
Artistic=Artistic-2.0
MPL-2.0+=MPL-2.0
"
