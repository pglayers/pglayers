DESCRIPTION="MongoDB-compatible document database engine built on PostgreSQL"
REPO="https://github.com/documentdb/documentdb.git"
LICENSE="MIT"
VERSION_17="v0.113-0"
VERSION_18="v0.113-0"
SHARED_PRELOAD="pg_documentdb_core,pg_documentdb,pg_documentdb_gw_host"
PG_CONF="documentdb_gateway.database = 'postgres'|documentdb_gateway.setup_configuration_file = '/etc/documentdb/gateway_config.json'"
NOTES="Requires pg_cron, pgvector, PostGIS, tsm_system_rows for full documentdb extension. Gateway listens on port 10260 (MongoDB wire protocol)."
TAG_FILTER="^v0\."
