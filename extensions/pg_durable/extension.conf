DESCRIPTION="In-database durable execution (fault-tolerant workflows in SQL)"
REPO="https://github.com/microsoft/pg_durable.git"
LICENSE="PostgreSQL"
VERSION_17="v0.2.3"
VERSION_18="v0.2.3"
SHARED_PRELOAD="pg_durable"
PG_CONF="pg_durable.database = 'postgres'|pg_durable.worker_role = 'postgres'|pg_durable.enable_superuser_instances = on"
NOTES="Requires shared_preload_libraries = 'pg_durable'. Needs pg_durable.database and pg_durable.worker_role GUCs."
